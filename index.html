<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Weather</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="wrapper">
        
        <div class="card">
            <h1>Weather</h1>

            <div class="search">
                <input type="text" id="cityInput" placeholder="Search city...">
                <button onclick="getWeather()" class="search-btn"><i class="ph ph-magnifying-glass"></i></button>
            </div>

            <p id="loading"></p>

            <div id="weather"></div>

            <p id="suggestion"></p>

            <div class="controls">
                <button onclick="filterHot()"><i class="ph ph-fire"></i> Hot</button>
                <button onclick="filterCold()"><i class="ph ph-snowflake"></i> Cold</button>
                <button onclick="sortHigh()"><i class="ph ph-sort-descending"></i> High-Low</button>
                <button onclick="sortLow()"><i class="ph ph-sort-ascending"></i> Low-High</button>
            </div>

<div id="forecast"></div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
