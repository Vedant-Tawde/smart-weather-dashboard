<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Weather</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="wrapper">
        
        <div class="card">
            <h1>Weather</h1>

            <div class="search">
                <input type="text" id="cityInput" placeholder="Search city...">
                <button onclick="getWeather()">Search</button>
            </div>

            <p id="loading"></p>

            <div id="weather"></div>

            <p id="suggestion"></p>

            <div class="controls">
                <button onclick="filterHot()">Hot Days</button>
                <button onclick="filterCold()">Cold Days</button>
                <button onclick="sortHigh()">Sort High</button>
                <button onclick="sortLow()">Sort Low</button>
            </div>

<div id="forecast"></div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
